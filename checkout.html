<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Sigree</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Closed Booking Message Styles */
    .closed-container {
      max-width: 64rem;
      margin: 0 auto;
      padding: 3rem 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60vh;
    }

    .closed-box {
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(212, 175, 55, 0.1);
      border-radius: 0.5rem;
      padding: 2rem;
      text-align: center;
      max-width: 40rem;
      width: 100%;
    }

    .closed-message {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.25rem, 4vw, 1.5rem);
      color: #D4AF37;
      margin: 0;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">
        <img src="https://sigree-candle-light-dinner.vercel.app/static/logo.png" alt="Logo" class="header-logo">
        <h1>Sigree</h1>
      </div>
    </div>
  </header>

  <main class="closed-container">
    <div class="closed-box">
      <p class="closed-message">The booking for this event has been closed. If you have already placed an order and want to make changes in that, please contact support at 7067466990</p>
    </div>
  </main>

  <!-- Sponsors Section -->
  <footer class="sponsors-section">
    <div class="main-sponsor-section">
      <h3>Sponsored By</h3>
      <div class="sponsor big">
        <img src="https://sigree-candle-light-dinner.vercel.app/static/grabo.jpg" alt="Grabbo">
        <span><b>Grabbo</b></span>
      </div>
    </div>

    <div class="combined-sponsors-section">
      <div class="combined-grid">
        <div class="co-sponsors-wrapper">
          <h3>Co-Sponsors</h3>
          <div class="sponsors-grid small">
            <div class="sponsor">
              <img src="https://sigree-candle-light-dinner.vercel.app/static/grub.png" alt="Grub">
              <span><b>Grub</b></span>
            </div>
            <div class="sponsor">
              <img src="https://sigree-candle-light-dinner.vercel.app/static/nescafe.jpeg" alt="Nescafe">
              <span><b>Nescafe</b></span>
            </div>
          </div>
        </div>
        <div class="candle-sponsor-wrapper">
          <h3>Candle Sponsor</h3>
          <div class="sponsor small">
            <img src="https://sigree-candle-light-dinner.vercel.app/static/gloralflow.jpg" alt="Gloral Flow">
            <span><b>Gloral Flow</b></span>
          </div>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
