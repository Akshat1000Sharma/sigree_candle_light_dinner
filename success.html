<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed - Sigree</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">
        <img src="https://sigree-candle-light-dinner.vercel.app/static/logo.png" alt="Logo" class="header-logo">
        <h1>Sigree</h1>
      </div>
    </div>
  </header>

  <main class="success-container">
    <div class="animate-fade-in-up" style="max-width: 32rem; width: 100%;">
      <div class="success-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h1 class="success-title">Order Confirmed!</h1>
      <p class="success-msg">Thank you for your order. We'll prepare your delicious meal with care. You will receive the confirmation mail shortly after our team verifies your payment.</p>
      <div class="decor-line">
        <div class="h-px w-12 bg-gradient-to-r from-transparent to-[#D4AF37]"></div>
        <div class="candle-flame"></div>
        <div class="h-px w-12 bg-gradient-to-l from-transparent to-[#D4AF37]"></div>
      </div>
      <a href="menu.html" class="begin-btn" style="display: inline-block; padding: 0.75rem 2rem; font-size: 1rem;">Back to Menu</a>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
